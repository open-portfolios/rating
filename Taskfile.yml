# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  GOHOSTOS:
    sh: go env GOHOSTOS
  GOPATH:
    sh: go env GOPATH
  VERSION:
    sh: git describe --tags --always

tasks:
  init:
    desc: Install CLI tools
    cmds:
      - cmd: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        if: "! command -v protoc-gen-go > /dev/null 2>&1"
      - cmd: go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        if: "! command -v protoc-gen-go-grpc > /dev/null 2>&1"
      - cmd: go install github.com/go-kratos/kratos/cmd/kratos/v2@latest
        if: "! command -v kratos > /dev/null 2>&1"
      - cmd: go install github.com/go-kratos/kratos/cmd/protoc-gen-go-http/v2@latest
        if: "! command -v protoc-gen-go-http > /dev/null 2>&1"
      - cmd: go install github.com/google/gnostic/cmd/protoc-gen-openapi@latest
        if: "! command -v protoc-gen-openapi > /dev/null 2>&1"
      - cmd: go install github.com/google/wire/cmd/wire@latest
        if: "! command -v wire > /dev/null 2>&1"
    silent: true

  conf:
    desc: Generate configuration protobuf
    deps:
      - init
    shopt:
      - globstar
    cmd: |
      protoc --proto_path=./internal                   \
             --proto_path=./third_party                \
             --go_out=paths=source_relative:./internal \
      internal/**/*.proto
    silent: true

  api:
    desc: Generate API protobuf
    deps:
      - init
    shopt:
      - globstar
    cmds:
      - |
        protoc --proto_path=./api                                           \
               --proto_path=./third_party                                   \
               --go_out=paths=source_relative:./api                         \
               --go-http_out=paths=source_relative:./api                    \
               --go-grpc_out=paths=source_relative:./api                    \
               --openapi_out=fq_schema_naming=true,default_response=false:. \
        api/**/*.proto
      - |
        for p in api/**/*.proto; do
          kratos proto server $p
        done
    silent: true

  wire:
    desc: Wire DI
    deps:
      - init
    shopt:
      - globstar
    cmd: |
      for dir in **/wire.go; do
        dir=${dir%%wire.go}
        cd "$dir" && wire
      done
    silent: true

  all:
    desc: Generate configuration, API and perform wire.
    cmds:
      - task: conf
      - task: api
      - task: wire

  build:
    desc: Build executables
    cmds:
      - mkdir -p bin
      - go build -ldflags "-X main.Version={{.VERSION}}" -o bin/ ./...
    silent: true
